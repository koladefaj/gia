[alembic]
# Path to the migration scripts directory
script_location = alembic
prepend_sys_path = .

# Overridden in env.py via settings.database_url — this placeholder is never used
sqlalchemy.url = postgresql+asyncpg://gia:gia@localhost:5432/gia

[post_write_hooks]
# hooks = ruff-format
# ruff-format.type = exec
# ruff-format.executable = %(here)s/.venv/bin/ruff
# ruff-format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
