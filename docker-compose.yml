services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gia
      POSTGRES_PASSWORD: gia
      POSTGRES_DB: gia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gia"]
      interval: 5s
      timeout: 5s
      retries: 5

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # We test against real ElevenLabs (v3) now, so skip Kokoro/torch — it
        # pulls a huge dependency tree and a 327MB model that slow the build.
        # ElevenLabs is HTTP-only (no package). Flip back to "true" only if you
        # want zero-cost local TTS while iterating.
        INSTALL_LOCAL_TTS: "false"
        # Keep faster-whisper for local STT (voice input from the browser).
        # NOTE: to bake the faster `large-v3-turbo` model, add `STT_MODEL: "large-v3-turbo"`
        # here and rebuild — but only on a fast connection (the model is ~1.6GB and
        # the bake pulls apt packages too). On a slow link the build is impractical.
        INSTALL_LOCAL_STT: "true"
    # Pass the host GPU (RTX 4060) through so faster-whisper transcribes on CUDA
    # instead of CPU — several times faster, lower per-turn latency. Falls back
    # to CPU automatically if the GPU isn't available (see stt._pick_device).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gia:gia@postgres:5432/gia
      WEAVIATE_URL: http://weaviate:8080
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Real TTS via ElevenLabs (v3 for emotional lines, flash for logistics).
      # ELEVENLABS_API_KEY / ELEVENLABS_VOICE_ID come from .env.
      TTS_PROVIDER: elevenlabs
      # STT model for the local path. large-v3 is baked into the image. STT_PROVIDER
      # (in .env) selects local-GPU vs the OpenAI Whisper API; on local large-v3 and
      # the OpenAI API measured ~the same latency (~2s), so .env currently uses openai.
      STT_MODEL: large-v3
      # Never write .pyc — Windows bind-mount mtimes are unreliable, so cached
      # bytecode goes stale and the reloader keeps running old code.
      PYTHONDONTWRITEBYTECODE: "1"
      # Remap Ollama to the host machine — inside Docker "localhost" is the
      # container itself, not the machine running Ollama.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # Spotify MCP — the api container spawns the Node server (mounted below)
      # over stdio. Paths are container-side; the build/ + node_modules dirs are
      # Linux-native named volumes (see `volumes:`), so the host's Windows
      # node_modules never leak in. spotify-config.json (OAuth tokens) lives in
      # the bind-mounted repo root, so refreshed tokens persist back to the host.
      SPOTIFY_MCP_COMMAND: node
      SPOTIFY_MCP_SERVER_PATH: /opt/spotify-mcp-server/build/index.js
      SPOTIFY_CONFIG_PATH: /opt/spotify-mcp-server/spotify-config.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./scripts:/app/scripts
      # The patched Spotify MCP server (sibling clone). node_modules + build are
      # shadowed by named volumes so they are (re)built Linux-native in-container.
      - ../spotify-mcp-server:/opt/spotify-mcp-server
      - mcp_node_modules:/opt/spotify-mcp-server/node_modules
      - mcp_build:/opt/spotify-mcp-server/build
    command: >
      sh -c "if [ ! -e /opt/spotify-mcp-server/node_modules/.package-lock.json ]; then
               npm --prefix /opt/spotify-mcp-server ci ;
             fi &&
             npm --prefix /opt/spotify-mcp-server run build &&
             alembic upgrade head &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # The Celery worker never synthesises speech or transcribes audio.
        INSTALL_LOCAL_TTS: "false"
        INSTALL_LOCAL_STT: "false"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gia:gia@postgres:5432/gia
      WEAVIATE_URL: http://weaviate:8080
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: celery -A backend.worker.celery_app worker --loglevel=info

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend/nextjs:/app
      # Named volume keeps node_modules Linux-native (Windows paths don't bleed in)
      # and makes subsequent `npm install` near-instant after the first run.
      - nextjs_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      # Browser makes API calls directly to the exposed host port.
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  weaviate_data:
  redis_data:
  # Linux-native node_modules / build for the mounted Spotify MCP server, so the
  # host's Windows-built copies never shadow into the container.
  mcp_node_modules:
  mcp_build:
  nextjs_node_modules:
