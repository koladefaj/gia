# Production override — ElevenLabs TTS, no local Kokoro/torch.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# This layers on top of docker-compose.yml and changes only what differs in
# production:
#   - Build the api torch-free (INSTALL_LOCAL_TTS=false) — no Kokoro/CUDA, small
#     image, fast deploy.
#   - Use ElevenLabs for TTS (HTTP, no local packages).
#
# Set the credentials in the environment / .env (NOT committed):
#   ELEVENLABS_API_KEY, ELEVENLABS_VOICE_ID, OPENAI_API_KEY, etc.
#
# Note: this is the TTS/runtime delta only. Fuller prod hardening (drop the dev
# bind-mounts + --reload, run multiple uvicorn workers, real secrets) belongs to
# deployment day and is intentionally not done here.
services:
  api:
    build:
      args:
        INSTALL_LOCAL_TTS: "false"
    environment:
      TTS_PROVIDER: elevenlabs

  worker:
    build:
      args:
        INSTALL_LOCAL_TTS: "false"
